<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirme seu e-mail</title>
  </head>
  <body style="margin:0;background:#f2eddf;font-family:Arial,sans-serif;color:#2b1f16;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
      <tr>
        <td align="center" style="padding:48px 20px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
            style="max-width:480px;background:#fffaf0;border-radius:20px;">
            <tr>
              <td style="padding:40px;text-align:center;">
                <h1 style="margin:0 0 12px;font-size:26px;">Confirme seu e-mail</h1>
                <p style="margin:0 0 28px;color:#6f5b48;line-height:1.6;">
                  Falta só confirmar seu endereço para acessar sua agenda no Boby.
                </p>
                <a href="{{ .ConfirmationURL }}"
                  style="display:inline-block;padding:14px 24px;border-radius:12px;background:#3c8f5a;color:#fff;text-decoration:none;font-weight:700;">
                  Confirmar e-mail
                </a>
                <p style="margin:28px 0 0;color:#6f5b48;font-size:12px;line-height:1.5;">
                  Se você não criou esta conta, ignore esta mensagem.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
